<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schmoëtt — Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0b06;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #e0d8c8;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #F5EDD8;
            margin-bottom: 2.5rem;
        }

        .logo .accent {
            color: #C9974A;
        }

        .chef-scene {
            width: 240px;
            height: 260px;
            margin: 0 auto 2.5rem;
        }

        /* Stirring arm animation */
        .stir-arm {
            transform-origin: 108px 140px;
            animation: stir 1.4s ease-in-out infinite;
        }

        @keyframes stir {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        /* Spoon in pot follows arm */
        .spoon-group {
            transform-origin: 130px 175px;
            animation: spoonStir 1.4s ease-in-out infinite;
        }

        @keyframes spoonStir {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Body sway */
        .chef-body {
            animation: sway 1.4s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(2px); }
        }

        /* Steam animations */
        .steam {
            opacity: 0;
            animation: steamRise 2.5s ease-out infinite;
        }
        .steam1 { animation-delay: 0s; }
        .steam2 { animation-delay: 0.8s; }
        .steam3 { animation-delay: 1.6s; }

        @keyframes steamRise {
            0% { opacity: 0; transform: translateY(0) scaleX(1); }
            20% { opacity: 0.6; }
            60% { opacity: 0.3; transform: translateY(-30px) scaleX(1.4); }
            100% { opacity: 0; transform: translateY(-55px) scaleX(1.8); }
        }

        .message {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.7;
            color: #a89a82;
            opacity: 0;
            animation: fadeUp 1.2s ease-out 0.5s forwards;
        }

        .date {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.6rem 1.8rem;
            border: 1px solid rgba(201, 151, 74, 0.3);
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #C9974A;
            background: rgba(201, 151, 74, 0.06);
            opacity: 0;
            animation: fadeUp 1.2s ease-out 1s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #3a3228;
            opacity: 0;
            animation: fadeUp 1s ease-out 1.4s forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SCHMO<span class="accent">Ë</span>TT</div>

        <div class="chef-scene">
            <svg viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg">

                <!-- Floor -->
                <line x1="40" y1="235" x2="200" y2="235" stroke="#1e1710" stroke-width="2" stroke-linecap="round"/>

                <!-- Stove -->
                <rect x="110" y="200" width="70" height="35" rx="4" fill="#1a1410"/>
                <rect x="112" y="202" width="66" height="6" rx="2" fill="#2a2018"/>
                <!-- Burner glow -->
                <ellipse cx="145" cy="202" rx="18" ry="3" fill="#3a1a08" opacity="0.6"/>
                <ellipse cx="145" cy="202" rx="12" ry="2" fill="#6a2a0a" opacity="0.4"/>

                <!-- Pot -->
                <rect x="120" y="178" width="50" height="26" rx="4" fill="#4a4040"/>
                <rect x="118" y="176" width="54" height="6" rx="3" fill="#5a5050"/>
                <!-- Pot handles -->
                <rect x="112" y="184" width="10" height="4" rx="2" fill="#5a5050"/>
                <rect x="168" y="184" width="10" height="4" rx="2" fill="#5a5050"/>

                <!-- Liquid in pot -->
                <ellipse cx="145" cy="182" rx="22" ry="5" fill="#6a4420" opacity="0.7"/>

                <!-- Spoon in pot -->
                <g class="spoon-group">
                    <line x1="138" y1="155" x2="145" y2="182" stroke="#b89860" stroke-width="3" stroke-linecap="round"/>
                    <ellipse cx="146" cy="184" rx="5" ry="3" fill="#a08040" opacity="0.5"/>
                </g>

                <!-- Steam -->
                <g class="steam steam1">
                    <path d="M135 170 Q132 160 136 152 Q140 144 137 136" stroke="#F5EDD8" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
                </g>
                <g class="steam steam2">
                    <path d="M145 168 Q148 158 144 150 Q140 142 143 134" stroke="#F5EDD8" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
                </g>
                <g class="steam steam3">
                    <path d="M155 170 Q152 160 156 152 Q160 144 157 136" stroke="#F5EDD8" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
                </g>

                <g class="chef-body">
                    <!-- Legs -->
                    <line x1="80" y1="205" x2="72" y2="233" stroke="#2a2a40" stroke-width="5" stroke-linecap="round"/>
                    <line x1="90" y1="205" x2="98" y2="233" stroke="#2a2a40" stroke-width="5" stroke-linecap="round"/>

                    <!-- Shoes -->
                    <ellipse cx="70" cy="234" rx="8" ry="4" fill="#1a1a20"/>
                    <ellipse cx="100" cy="234" rx="8" ry="4" fill="#1a1a20"/>

                    <!-- Body -->
                    <rect x="68" y="148" width="32" height="60" rx="10" fill="#f0f0f0"/>

                    <!-- Apron -->
                    <rect x="72" y="158" width="24" height="42" rx="4" fill="#e8e0d0"/>
                    <line x1="84" y1="158" x2="84" y2="200" stroke="#d0c8b8" stroke-width="0.8"/>

                    <!-- Apron strings -->
                    <path d="M72 162 Q65 160 68 155" stroke="#d8d0c0" stroke-width="1.2" fill="none"/>
                    <path d="M96 162 Q103 160 100 155" stroke="#d8d0c0" stroke-width="1.2" fill="none"/>

                    <!-- Left arm (resting at side) -->
                    <line x1="70" y1="155" x2="60" y2="180" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="59" cy="182" r="3.5" fill="#f0c8a0"/>

                    <!-- Head -->
                    <circle cx="84" cy="128" r="18" fill="#f0c8a0"/>

                    <!-- Eyes -->
                    <circle cx="78" cy="126" r="2" fill="#1a1208"/>
                    <circle cx="90" cy="126" r="2" fill="#1a1208"/>

                    <!-- Happy smile -->
                    <path d="M78 134 Q84 140 90 134" stroke="#c4956a" stroke-width="1.3" fill="none" stroke-linecap="round"/>

                    <!-- Cheeks (rosy) -->
                    <circle cx="74" cy="132" r="3" fill="#e8a880" opacity="0.4"/>
                    <circle cx="94" cy="132" r="3" fill="#e8a880" opacity="0.4"/>

                    <!-- Mustache -->
                    <path d="M78 131 Q82 129 84 131 Q86 129 90 131" stroke="#6a4a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

                    <!-- Toque (chef hat) -->
                    <ellipse cx="84" cy="113" rx="20" ry="5" fill="#f8f8f4"/>
                    <rect x="68" y="88" width="32" height="26" rx="8" fill="#ffffff"/>
                    <!-- Toque puff top -->
                    <ellipse cx="76" cy="86" rx="10" ry="10" fill="#ffffff"/>
                    <ellipse cx="92" cy="86" rx="10" ry="10" fill="#ffffff"/>
                    <ellipse cx="84" cy="82" rx="10" ry="12" fill="#ffffff"/>
                    <!-- Toque band -->
                    <rect x="68" y="110" width="32" height="4" rx="1" fill="#e8e0d0"/>
                </g>

                <!-- Right arm (stirring) -->
                <g class="stir-arm">
                    <!-- Upper arm -->
                    <line x1="98" y1="155" x2="115" y2="145" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
                    <!-- Forearm -->
                    <line x1="115" y1="145" x2="135" y2="155" stroke="#f0c8a0" stroke-width="4" stroke-linecap="round"/>
                    <!-- Hand gripping spoon -->
                    <circle cx="136" cy="156" r="3.5" fill="#f0c8a0"/>
                </g>

            </svg>
        </div>

        <p class="message">Site en travaux pour ameliorer votre experience</p>
        <div class="date">Retour en ligne — Lundi 6 avril 2026</div>
        <div class="footer">&copy; 2026 Schmo&euml;tt — Luxembourg</div>
    </div>
</body>
</html>
